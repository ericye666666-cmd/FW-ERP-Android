name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build Direct Loop PDA debug APK
    runs-on: ubuntu-latest
    env:
      PDA_DEBUG_KEYSTORE_BASE64: ${{ secrets.PDA_DEBUG_KEYSTORE_BASE64 }}
      PDA_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.PDA_DEBUG_KEYSTORE_PASSWORD }}
      PDA_DEBUG_KEY_ALIAS: ${{ secrets.PDA_DEBUG_KEY_ALIAS }}
      PDA_DEBUG_KEY_PASSWORD: ${{ secrets.PDA_DEBUG_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Decode stable debug signing key
        if: ${{ env.PDA_DEBUG_KEYSTORE_BASE64 != '' }}
        run: |
          if [ -z "$PDA_DEBUG_KEYSTORE_PASSWORD" ] || [ -z "$PDA_DEBUG_KEY_ALIAS" ] || [ -z "$PDA_DEBUG_KEY_PASSWORD" ]; then
            echo "PDA debug signing secrets are incomplete." >&2
            exit 1
          fi
          printf '%s' "$PDA_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/pda-debug.keystore"

      - name: Build debug APK
        env:
          PDA_DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/pda-debug.keystore
        run: ./gradlew assembleDebug

      - name: Prepare APK artifact
        run: cp app/build/outputs/apk/debug/app-debug.apk direct-loop-pda-debug.apk

      - name: Upload Direct Loop PDA debug APK
        uses: actions/upload-artifact@v4
        with:
          name: direct-loop-pda-debug-apk
          path: direct-loop-pda-debug.apk
          if-no-files-found: error
          retention-days: 14
