name: Build Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build Direct Loop PDA debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Prepare APK artifact
        run: cp app/build/outputs/apk/debug/app-debug.apk direct-loop-pda-debug.apk

      - name: Upload Direct Loop PDA debug APK
        uses: actions/upload-artifact@v4
        with:
          name: direct-loop-pda-debug-apk
          path: direct-loop-pda-debug.apk
          if-no-files-found: error
          retention-days: 14
