name: Build Environment Debug APKs

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build Direct Loop PDA environment debug APKs
    runs-on: ubuntu-latest
    env:
      PDA_DEBUG_KEYSTORE_BASE64: ${{ secrets.PDA_DEBUG_KEYSTORE_BASE64 }}
      PDA_DEBUG_KEYSTORE_PASSWORD: ${{ secrets.PDA_DEBUG_KEYSTORE_PASSWORD }}
      PDA_DEBUG_KEY_ALIAS: ${{ secrets.PDA_DEBUG_KEY_ALIAS }}
      PDA_DEBUG_KEY_PASSWORD: ${{ secrets.PDA_DEBUG_KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Decode stable debug signing key
        if: ${{ env.PDA_DEBUG_KEYSTORE_BASE64 != '' }}
        run: |
          if [ -z "$PDA_DEBUG_KEYSTORE_PASSWORD" ] || [ -z "$PDA_DEBUG_KEY_ALIAS" ] || [ -z "$PDA_DEBUG_KEY_PASSWORD" ]; then
            echo "PDA debug signing secrets are incomplete." >&2
            exit 1
          fi
          printf '%s' "$PDA_DEBUG_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/pda-debug.keystore"

      - name: Build production and staging debug APKs
        env:
          PDA_DEBUG_KEYSTORE_PATH: ${{ runner.temp }}/pda-debug.keystore
        run: ./gradlew assembleProductionDebug assembleStagingDebug

      - name: Prepare APK artifacts
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/production/debug/app-production-debug.apk artifacts/direct-loop-pda-production-debug.apk
          cp app/build/outputs/apk/staging/debug/app-staging-debug.apk artifacts/direct-loop-pda-staging-debug.apk

      - name: Upload Direct Loop PDA environment debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: direct-loop-pda-environment-debug-apks
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 14
